<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Newlands — Programme Tracker</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --charcoal:#1e1d1c; --cream:#FCFCF7; --white:#ffffff;
    --earth:#4a3d33; --stone:#dbded1; --eucalyptus:#8f948a;
    --leaf:#3b3d33; --deepLeaf:#2e3029;
    --hairline:#e5e3da; --muted:#807d76;
    --ahead:#3b3d33; --ontrack:#8f948a; --behind:#b46a3c; --blocked:#7a3622;
    --notstarted:#c8cbc1;
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  html, body { margin:0; padding:0; font-family: var(--font); background: var(--cream); color: var(--charcoal); -webkit-font-smoothing: antialiased; }
  body { max-width: 480px; margin: 0 auto; background: var(--cream); min-height: 100vh; position: relative; }
  button { font-family: var(--font); cursor: pointer; }

  /* utility */
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); font-weight: 500; }
  .hairline { background: var(--hairline); height: 1px; width: 100%; }
  .tab-num { font-variant-numeric: tabular-nums; }

  /* Sticky header */
  .header { position: sticky; top: 0; z-index: 20; background: var(--cream); border-bottom: 1px solid var(--hairline); padding: 16px 20px 12px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header-back { background: none; border: none; padding: 4px; color: var(--charcoal); display: inline-flex; align-items: center; gap: 4px; margin-left: -4px; }
  .header-brand { font-size: 14px; color: var(--charcoal); font-weight: 500; }
  .header-brand .dot { color: var(--eucalyptus); }
  .header h1 { font-size: 24px; color: var(--charcoal); font-weight: 500; margin: 0; letter-spacing: -0.01em; line-height: 1.15; }
  .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 4px; }

  /* Sections */
  section { padding: 20px; }
  section.tight { padding: 16px 20px; }

  /* Portfolio */
  .big-num { font-size: 48px; color: var(--charcoal); font-weight: 300; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .big-num .pct-sym { font-size: 22px; color: var(--muted); margin-left: 2px; }
  .mid-num { font-size: 36px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; color: var(--charcoal); }
  .mid-num .pct-sym { font-size: 18px; color: var(--muted); }
  .row { display: flex; }
  .row.gap-3 { gap: 12px; }
  .row.gap-4 { gap: 16px; }
  .items-baseline { align-items: baseline; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .text-xs { font-size: 12px; }
  .text-sm { font-size: 13px; }
  .text-11 { font-size: 11px; }
  .text-10 { font-size: 10px; }
  .text-muted { color: var(--muted); }
  .text-charcoal { color: var(--charcoal); }
  .text-behind { color: var(--behind); }
  .text-ahead { color: var(--ahead); }
  .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; }
  .mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; }

  /* Progress bar */
  .progress-track { position: relative; width: 100%; background: var(--hairline); border-radius: 999px; }
  .progress-fill { position: absolute; top: 0; left: 0; background: var(--charcoal); border-radius: 999px; height: 100%; transition: width 0.3s; }
  .progress-marker { position: absolute; top: -3px; width: 2px; background: var(--eucalyptus); border-radius: 1px; }

  /* Status dots & chips */
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--ontrack); }
  .dot.ahead { background: var(--ahead); }
  .dot.ontrack { background: var(--ontrack); }
  .dot.behind { background: var(--behind); }
  .dot.blocked { background: var(--blocked); }
  .dot.notstarted { background: var(--notstarted); }

  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; background: var(--cream); border: 1px solid var(--hairline); color: var(--charcoal); }
  .cp-badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 3px; font-size: 9px; background: var(--behind); color: var(--cream); letter-spacing: 0.08em; font-weight: 500; text-transform: uppercase; }
  .cp-badge.large { font-size: 10px; padding: 2px 8px; }
  .ms-badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 3px; font-size: 9px; background: var(--eucalyptus); color: var(--cream); letter-spacing: 0.08em; font-weight: 500; text-transform: uppercase; }

  /* Variance badge */
  .variance { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
  .variance.ahead { color: var(--ahead); }
  .variance.behind { color: var(--behind); }
  .variance.flat { color: var(--muted); }
  .variance svg { width: 12px; height: 12px; stroke-width: 2; }

  /* Cards / tiles */
  .tile { width: 100%; text-align: left; background: var(--white); border: 1px solid var(--hairline); border-radius: 10px; padding: 16px; margin-bottom: 10px; display: block; }
  .tile-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tile-name { color: var(--charcoal); font-weight: 500; font-size: 14px; }
  .tile-sub { font-size: 12px; color: var(--muted); }

  .card { background: var(--white); border: 1px solid var(--hairline); border-radius: 8px; padding: 14px; }
  .card-row { background: var(--white); border: 1px solid var(--hairline); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; width: 100%; text-align: left; }

  /* Programme list item */
  .activity { width: 100%; text-align: left; padding: 12px 4px; display: flex; gap: 12px; align-items: flex-start; border-bottom: 1px solid var(--hairline); background: transparent; border-left: none; border-right: none; border-top: none; }
  .activity:last-child { border-bottom: none; }
  .activity-content { flex: 1; min-width: 0; }
  .activity-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .activity-title { color: var(--charcoal); font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .activity-pct { font-size: 13px; color: var(--charcoal); font-variant-numeric: tabular-nums; }
  .activity-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }
  .activity-comment { margin-top: 6px; font-size: 11px; color: var(--charcoal); }
  .activity-comment .lbl { color: var(--muted); }

  /* Floor strip */
  .floor-strip { display: flex; gap: 2px; height: 18px; margin-top: 8px; align-items: stretch; }
  .floor-cell { flex: 1; border-radius: 2px; min-width: 6px; max-width: 22px; position: relative; }
  .floor-cell.complete { background: var(--charcoal); }
  .floor-cell.in_progress { background: var(--eucalyptus); }
  .floor-cell.behind { background: var(--behind); }
  .floor-cell.not_started { background: var(--stone); }
  .floor-cell.no_data { background: var(--hairline); opacity: 0.55; }
  .floor-axis { display: flex; gap: 2px; margin-top: 2px; }
  .floor-axis-label { flex: 1; min-width: 6px; max-width: 22px; text-align: center; font-size: 8px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Trade group */
  .trade-card { padding: 12px 4px 14px; border-bottom: 1px solid var(--hairline); }
  .trade-card:last-child { border-bottom: none; }
  .trade-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .trade-name { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; color: var(--charcoal); font-size: 14px; font-weight: 500; }
  .trade-pct { font-size: 14px; color: var(--charcoal); font-variant-numeric: tabular-nums; }
  .category-header { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); font-weight: 500; padding: 14px 4px 8px; border-bottom: 1px solid var(--hairline); margin-top: 8px; }
  .category-header:first-child { padding-top: 0; }
  .trade-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 6px; font-size: 11px; color: var(--muted); }
  .trade-comment { margin-top: 6px; font-size: 11px; color: var(--charcoal); }
  .trade-comment .lbl { color: var(--muted); }

  /* Floor legend */
  .floor-legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 10px; color: var(--muted); margin: 4px 0 12px; }
  .floor-legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .floor-legend-sw { display: inline-block; width: 10px; height: 8px; border-radius: 1px; }

  /* Mitigation card */
  .mitigation { background: var(--cream); border: 1px solid var(--hairline); border-radius: 6px; padding: 12px; margin-top: 8px; }
  .mitigation-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

  /* Bottom tab nav */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--cream); border-top: 1px solid var(--hairline); display: flex; padding: 10px 12px 16px; z-index: 40; }
  .bottom-nav button { flex: 1; background: none; border: none; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  .bottom-nav button.active { color: var(--charcoal); }
  .bottom-nav button svg { width: 20px; height: 20px; }

  /* Empty space for fixed nav */
  .nav-spacer { height: 90px; }

  /* Icons inline */
  .icon { width: 16px; height: 16px; stroke-width: 1.6; vertical-align: middle; }

  /* Stat grid */
  .stat { padding: 12px 0; }
  .stat .value { font-size: 14px; color: var(--charcoal); font-weight: 500; margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* Search input */
  .search { width: 100%; padding: 10px 14px; border: 1px solid var(--hairline); background: var(--white); border-radius: 999px; font-size: 13px; font-family: var(--font); color: var(--charcoal); }
  .search:focus { outline: none; border-color: var(--eucalyptus); }
  .filter-chip { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 999px; font-size: 12px; background: var(--white); border: 1px solid var(--hairline); color: var(--charcoal); margin-right: 6px; cursor: pointer; }
  .filter-chip.active { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }

  /* Section group */
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .group-title { font-size: 13px; color: var(--charcoal); font-weight: 500; margin-bottom: 8px; }

  /* Animation */
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Wider screen — soft cap */
  @media (min-width: 481px) {
    body { background: #f0eee5; }
    .app-shell { background: var(--cream); min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
    .bottom-nav { box-shadow: 0 -2px 12px rgba(0,0,0,0.03); }
  }
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('dataset').textContent);
const STATUS_DATE = new Date(DATA.meta.assessmentDate);

// ─── Helpers ─────────────────────────────────────────────────────────────
const DAY = 86400000;
function fmtDate(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric' }); }
function fmtShort(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('en-AU', { day:'2-digit', month:'short' }); }
function fmtShortNumeric(s) { if (!s) return '—'; const d = new Date(s); return d.toLocaleDateString('en-AU', { day:'2-digit', month:'2-digit', year:'2-digit' }); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / DAY); }
function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

// Status from float days
function statusForFloat(floatDays, programmeDate) {
  if (floatDays <= -10) return 'behind';
  if (floatDays <= -3) return 'behind';
  if (floatDays >= 3) return 'ahead';
  return 'ontrack';
}

// Building-level rollup (uses weeklyActivities — the flat list per building)
function buildingRollup(b) {
  const acts = b.weeklyActivities || [];
  const total = acts.length || 1;
  const slipped = acts.filter(a => a.floatDays < 0);
  const critSlip = slipped.filter(a => a.critical);
  const totalSlipDays = slipped.reduce((s, a) => s + a.floatDays, 0);
  const avgVariance = total > 0 ? Math.round(totalSlipDays / total) : 0;
  const worst = slipped.length ? Math.min(...slipped.map(a => a.floatDays)) : 0;
  const status = critSlip.length >= 3 ? 'behind' : slipped.length >= 5 ? 'behind' : slipped.length === 0 ? 'ontrack' : 'ontrack';
  return { total, slipped: slipped.length, critSlip: critSlip.length, worst, avgVariance, status };
}

// Portfolio rollup
function portfolioRollup() {
  const total = DATA.buildings.reduce((s, b) => s + (b.weeklyActivities || []).length, 0);
  const slipped = DATA.buildings.reduce((s, b) => s + (b.weeklyActivities || []).filter(a => a.floatDays < 0).length, 0);
  const critSlip = DATA.buildings.reduce((s, b) => s + (b.weeklyActivities || []).filter(a => a.floatDays < 0 && a.critical).length, 0);
  const totalApt = DATA.buildings.reduce((s, b) => s + b.apartments, 0);
  const weightedPct = DATA.buildings.reduce((s, b) => s + (b.overallPct || 0) * b.apartments, 0) / (totalApt || 1);
  const allSlipped = DATA.buildings.flatMap(b => (b.weeklyActivities || []).filter(a => a.floatDays < 0).map(a => a.floatDays));
  const worst = allSlipped.length ? Math.min(...allSlipped) : 0;
  const avgVar = DATA.buildings.reduce((s, b) => s + buildingRollup(b).avgVariance * b.apartments, 0) / (totalApt || 1);
  return { total, slipped, critSlip, totalApt, weightedPct, worst, avgVar };
}

// ─── Components (HTML string functions) ──────────────────────────────────
function progressBar(actual, expected, height) {
  const a = clamp(actual || 0, 0, 100);
  const e = expected ? clamp(expected, 0, 100) : 0;
  const h = height || 6;
  return `
    <div class="progress-track" style="height:${h}px">
      <div class="progress-fill" style="width:${a}%"></div>
      ${e > 0 && e < 100 ? `<div class="progress-marker" style="left:calc(${e}% - 1px);height:${h + 6}px"></div>` : ''}
    </div>`;
}

function statusDot(status, size) {
  return `<span class="dot ${status||'ontrack'}" style="${size?`width:${size}px;height:${size}px;`:''}"></span>`;
}

function varianceBadge(days) {
  const r = Math.round(days);
  if (r > 1) return `<span class="variance ahead">${ICONS.trendingUp}${r}d ahead</span>`;
  if (r < -1) return `<span class="variance behind">${ICONS.trendingDown}${Math.abs(r)}d behind</span>`;
  return `<span class="variance flat">${ICONS.minus}On programme</span>`;
}

function cpBadge(critical, compact) {
  if (!critical) return '';
  return `<span class="cp-badge ${compact ? '' : 'large'}" title="Critical path">CP</span>`;
}

function header(opts) {
  return `
    <div class="header">
      <div class="header-row">
        ${opts.back ? `<button class="header-back" onclick="${opts.back}">${ICONS.arrowLeft}</button>` : `<div class="header-brand">Eterno<span class="dot">.</span></div>`}
        <div class="header-right">${opts.right || ''}</div>
      </div>
      <h1>${opts.title}</h1>
      ${opts.subtitle ? `<div class="subtitle">${opts.subtitle}</div>` : ''}
    </div>`;
}

// ─── Views ───────────────────────────────────────────────────────────────
let route = { view: 'dashboard', buildingId: null };

function navigate(view, params) {
  route = { view, ...(params || {}) };
  render();
}
window.navigate = navigate;

function render() {
  const $app = document.getElementById('app');
  let html = '';
  switch (route.view) {
    case 'dashboard': html = dashboardView(); break;
    case 'building':  html = buildingView(route.buildingId); break;
    case 'milestones': html = milestonesView(); break;
    case 'variance':  html = varianceView(); break;
    default: html = dashboardView();
  }
  $app.innerHTML = `<div class="fade-in">${html}</div>${bottomNav()}<div class="nav-spacer"></div>`;
  window.scrollTo(0, 0);
}

function bottomNav() {
  const active = (n) => route.view === n ? 'active' : '';
  return `
    <div class="bottom-nav">
      <button class="${active('dashboard')}" onclick="navigate('dashboard')">${ICONS.home}<span>Portfolio</span></button>
      <button class="${active('milestones')}" onclick="navigate('milestones')">${ICONS.flag}<span>Milestones</span></button>
      <button class="${active('variance')}" onclick="navigate('variance')">${ICONS.alert}<span>Variance</span></button>
    </div>`;
}

// ─── Building Detail ──────────────────────────────────────────────────────
// Each building shows a trade list. Floor-by-floor trades render as a
// horizontal strip of small cells, one per level, colored by status.
const CATEGORIES = [
  { key: 'substructure', label: 'Substructure' },
  { key: 'structure',    label: 'Structure' },
  { key: 'envelope',     label: 'Envelope' },
  { key: 'services',     label: 'Services' },
  { key: 'finishes',     label: 'Finishes' },
  { key: 'completion',   label: 'Completion' },
  { key: 'external',     label: 'External works' },
];

function buildingRollupFromTrades(b) {
  const tradesWithData = b.trades.filter(t => t.hasData && t.pct !== null);
  const avgPct = tradesWithData.length ? Math.round(tradesWithData.reduce((s, t) => s + (t.pct || 0), 0) / tradesWithData.length) : (b.overallPct || 0);
  // Variance: aggregate floatDays across raw activities, average
  const allFloats = b.trades.flatMap(t => t.raw.filter(r => r.floatDays < 0).map(r => r.floatDays));
  const totalAct = b.weeklyActivities.length;
  const slipped = b.weeklyActivities.filter(a => a.floatDays < 0).length;
  const critSlip = b.weeklyActivities.filter(a => a.floatDays < 0 && a.critical).length;
  const avgVar = totalAct > 0 ? Math.round(b.weeklyActivities.reduce((s, a) => s + (a.floatDays < 0 ? a.floatDays : 0), 0) / totalAct) : 0;
  return { avgPct, slipped, critSlip, totalAct, avgVar };
}

function floorStrip(trade, building) {
  if (!trade.floorByFloor || !trade.levels) return '';
  const levels = trade.levels;
  // Render top → bottom so highest floor is on the left (cladding/scaffold reads naturally)
  // Actually the template uses bottom-up reverse. Let's render bottom→top with L1 on the left for consistency with construction sequence (services rough-in, kitchen joinery progress upward).
  const cells = levels.map(l => {
    const cls = l.hasData ? l.status : 'no_data';
    const tip = `L${l.level}: ${l.hasData ? l.status.replace('_',' ') + (l.floatDays < 0 ? ' (' + l.floatDays + 'd)' : '') + (l.comment ? ' — ' + l.comment : '') : 'no data this week'}`;
    return `<div class="floor-cell ${cls}" title="${esc(tip)}"></div>`;
  }).join('');
  // Axis labels for every 2nd or 3rd level depending on count
  const step = levels.length > 12 ? 4 : levels.length > 8 ? 3 : 2;
  const axis = levels.map((l, i) => `<div class="floor-axis-label">${i === 0 || i === levels.length-1 || (l.level % step === 0) ? 'L' + l.level : ''}</div>`).join('');
  return `<div class="floor-strip">${cells}</div><div class="floor-axis">${axis}</div>`;
}

function buildingView(id) {
  const b = DATA.buildings.find(x => x.id === id);
  if (!b) return dashboardView();
  const r = buildingRollupFromTrades(b);
  const daysToPC = daysBetween(STATUS_DATE, b.pcNet);

  // Group trades by category
  const tradesByCat = {};
  b.trades.filter(t => t.hasData).forEach(t => {
    (tradesByCat[t.category] ||= []).push(t);
  });

  const renderTrade = (t) => {
    const pct = t.pct == null ? '—' : t.pct + '%';
    const tone = (t.worstFloat || 0) <= -10 ? 'behind' : (t.worstFloat || 0) < 0 ? 'behind' : t.pct === 100 ? 'ahead' : t.pct >= 50 ? 'ontrack' : 'notstarted';
    // Show comment from worst-affected raw activity if any
    const worstRaw = t.raw.slice().sort((a, x) => a.floatDays - x.floatDays)[0];
    const showComment = worstRaw && worstRaw.comment;
    const showVariance = (t.worstFloat || 0) < 0;
    return `
      <div class="trade-card">
        <div class="trade-row">
          <div class="trade-name">
            ${statusDot(tone)}
            <span>${esc(t.name)}</span>
            ${t.critical ? cpBadge(true, true) : ''}
          </div>
          <span class="trade-pct">${pct}</span>
        </div>
        ${t.floorByFloor ? floorStrip(t, b) : `<div class="mt-2">${progressBar(t.pct || 0, null, 3)}</div>`}
        ${showVariance || worstRaw ? `
          <div class="trade-meta">
            <span>${t.raw.length} activit${t.raw.length === 1 ? 'y' : 'ies'} tracked${t.floorByFloor ? ` · ${t.levels.filter(l=>l.hasData).length} of ${t.levels.length} levels` : ''}</span>
            ${showVariance ? varianceBadge(t.worstFloat) : ''}
          </div>
        ` : ''}
        ${showComment ? `<div class="trade-comment"><span class="lbl">L${esc(worstRaw.level || '?')}: </span>${esc(worstRaw.comment)}</div>` : ''}
      </div>`;
  };

  const categorySections = CATEGORIES.map(cat => {
    const tradesInCat = tradesByCat[cat.key];
    if (!tradesInCat || tradesInCat.length === 0) return '';
    return `
      <div class="category-header">${cat.label}</div>
      ${tradesInCat.map(renderTrade).join('')}
    `;
  }).join('');

  return `
    ${header({
      title: b.name,
      subtitle: `${b.stage} · ${b.apartments} apartments · ${b.aptMix}`,
      back: `navigate('dashboard')`
    })}

    <section>
      <div class="row items-baseline gap-3">
        <div class="big-num" style="font-size:40px">${b.overallPct}<span class="pct-sym">%</span></div>
        ${varianceBadge(r.avgVar)}
      </div>
      <div class="mt-3">${progressBar(b.overallPct, null, 4)}</div>
      <div class="row justify-between mt-2 text-xs text-muted">
        <span>${r.slipped} of ${r.totalAct} slipping · ${r.critSlip} on CP</span>
        <span>${daysToPC} days to PC</span>
      </div>

      <div class="grid-3 mt-5">
        <div class="stat">
          <div class="label">Structure</div>
          <div class="value">${fmtShortNumeric(b.structureComplete)}</div>
        </div>
        <div class="stat">
          <div class="label">Watertight</div>
          <div class="value">${fmtShortNumeric(b.watertight)}</div>
        </div>
        <div class="stat">
          <div class="label">PC (net)</div>
          <div class="value">${fmtShortNumeric(b.pcNet)}</div>
        </div>
      </div>
    </section>

    <div class="hairline"></div>

    <section>
      <div class="section-head">
        <span class="label">Trade × floor progress</span>
        <span class="text-10 text-muted">${b.topLevel - b.levelStart + 1} levels</span>
      </div>
      <div class="floor-legend">
        <span class="floor-legend-item"><span class="floor-legend-sw" style="background:var(--charcoal)"></span>Complete</span>
        <span class="floor-legend-item"><span class="floor-legend-sw" style="background:var(--eucalyptus)"></span>In progress</span>
        <span class="floor-legend-item"><span class="floor-legend-sw" style="background:var(--behind)"></span>Behind</span>
        <span class="floor-legend-item"><span class="floor-legend-sw" style="background:var(--stone)"></span>Not started</span>
        <span class="floor-legend-item"><span class="floor-legend-sw" style="background:var(--hairline);opacity:0.55"></span>No data</span>
      </div>
      ${categorySections}
    </section>

    ${b.unmappedActivities && b.unmappedActivities.length > 0 ? `
      <div class="hairline"></div>
      <section>
        <div class="group-title">Other activities · ${b.unmappedActivities.length}</div>
        ${b.unmappedActivities.map(a => {
          const st = a.floatDays < -3 ? 'behind' : a.floatDays > 3 ? 'ahead' : 'ontrack';
          return `
            <div class="activity">
              ${statusDot(st, 8)}
              <div class="activity-content">
                <div class="activity-header">
                  <span class="activity-title">${a.level ? 'L' + esc(a.level) + ' · ' : ''}${esc(a.description)}${a.critical ? cpBadge(true, true) : ''}</span>
                  <span class="activity-pct">${a.floatDays < 0 ? `<span style="color:var(--behind)">${a.floatDays}d</span>` : a.floatDays > 0 ? `<span style="color:var(--ahead)">+${a.floatDays}d</span>` : 'On time'}</span>
                </div>
                <div class="activity-meta">
                  <span>Programme ${fmtShort(a.programmeDate)}${a.floatDays < 0 ? ` → ${fmtShort(a.revisedDate)}` : ''}</span>
                </div>
                ${a.comment ? `<div class="activity-comment"><span class="lbl">Comment: </span>${esc(a.comment)}</div>` : ''}
              </div>
            </div>`;
        }).join('')}
      </section>
    ` : ''}
  `;
}

// ─── Variance / Slip Register ────────────────────────────────────────────
let varianceState = { filter: 'all', search: '' };
function varianceView() {
  // Collect all slipping activities across buildings
  let rows = [];
  DATA.buildings.forEach(b => {
    (b.weeklyActivities || []).forEach(a => {
      if (a.floatDays !== 0) rows.push({ b, a });
    });
  });

  // Apply filter
  if (varianceState.filter === 'critical') rows = rows.filter(r => r.a.critical);
  if (varianceState.filter === 'behind') rows = rows.filter(r => r.a.floatDays < 0);
  if (varianceState.filter === 'ahead') rows = rows.filter(r => r.a.floatDays > 0);
  if (varianceState.search) {
    const s = varianceState.search.toLowerCase();
    rows = rows.filter(r => r.a.description.toLowerCase().includes(s) || r.b.name.toLowerCase().includes(s));
  }

  rows.sort((x, y) => x.a.floatDays - y.a.floatDays);
  const behind = rows.filter(r => r.a.floatDays < 0);
  const ahead = rows.filter(r => r.a.floatDays > 0);

  const renderRow = ({ b, a }) => `
    <button class="activity" onclick="navigate('building', { buildingId: '${b.id}' })" style="cursor:pointer">
      ${statusDot(a.floatDays < 0 ? 'behind' : 'ahead', 8)}
      <div class="activity-content">
        <div class="activity-header">
          <span class="activity-title">
            ${esc(a.description)}
            ${a.critical ? cpBadge(true, true) : ''}
          </span>
          ${varianceBadge(a.floatDays)}
        </div>
        <div class="activity-meta">
          <span>${b.name} · L${esc(a.level)} · Programme ${fmtShort(a.programmeDate)}${a.floatDays < 0 ? ` → ${fmtShort(a.revisedDate)}` : ''}</span>
        </div>
        ${a.comment ? `<div class="activity-comment"><span class="lbl">Comment: </span>${esc(a.comment)}</div>` : ''}
      </div>
    </button>`;

  const fc = (key, label) => `<button class="filter-chip ${varianceState.filter === key ? 'active' : ''}" onclick="setVarianceFilter('${key}')">${label}</button>`;

  return `
    ${header({ title: 'Variance', subtitle: `As of ${fmtDate(DATA.meta.assessmentDate)} · ${behind.length} behind · ${ahead.length} ahead`, back: `navigate('dashboard')` })}

    <section class="tight">
      <div style="display:flex;flex-wrap:wrap;gap:0 6px;margin-bottom:10px">
        ${fc('all', 'All')}${fc('behind', 'Behind')}${fc('critical', 'Critical path')}${fc('ahead', 'Ahead')}
      </div>
      <input class="search" type="text" placeholder="Search activity or building…" value="${esc(varianceState.search)}" oninput="onVarianceSearch(this)">
    </section>

    ${behind.length > 0 ? `
      <section>
        <div class="group-title">Behind programme · ${behind.length}</div>
        <div>${behind.map(renderRow).join('')}</div>
      </section>
    ` : ''}

    ${ahead.length > 0 ? `
      <section>
        <div class="group-title">Ahead of programme · ${ahead.length}</div>
        <div>${ahead.map(renderRow).join('')}</div>
      </section>
    ` : ''}

    ${rows.length === 0 ? `
      <section><div class="text-sm text-muted" style="text-align:center;padding:40px 0">No matching activities.</div></section>
    ` : ''}
  `;
}
function setVarianceFilter(f) { varianceState.filter = f; render(); }
window.setVarianceFilter = setVarianceFilter;

function onVarianceSearch(input) {
  const pos = input.selectionStart;
  varianceState.search = input.value;
  render();
  const next = document.querySelector('.search');
  if (next) { next.focus(); try { next.setSelectionRange(pos, pos); } catch(e){} }
}
window.onVarianceSearch = onVarianceSearch;

// ─── Initial render ──────────────────────────────────────────────────────
render();
</script>

</body>
</html>
